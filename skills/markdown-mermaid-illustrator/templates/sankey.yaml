name: "桑基图"
description: "展示从源到目标的流量/数量流向，节点宽度代表流量大小"
keywords: ["桑基", "流向", "流量", "能量流", "资金流", "转化", "漏斗流向"]
patterns:
  - type: "flow-quantity"
    indicators: ["流向", "从…到", "转化", "流量", "分配", "来源"]

mermaid_guidance: |
  使用 sankey-beta（注意：beta 功能）。
  格式：源节点,目标节点,数值
  源和目标名称相同则为同一节点（自动合并）。
  数值代表流量大小（影响节点宽度）。
  标签用英文或数字，避免含逗号。

example: |
  ---
  config:
    theme: neutral
    look: neo
  ---
  sankey-beta
      流量来源-搜索,自然流量,120
      流量来源-广告,付费流量,80
      流量来源-社交,社交流量,60
      自然流量,注册用户,45
      自然流量,跳出,75
      付费流量,注册用户,40
      付费流量,跳出,40
      社交流量,注册用户,20
      社交流量,跳出,40

limitations: |
  sankey-beta 是实验功能，渲染效果因平台而异。
  GitHub 目前支持有限。
