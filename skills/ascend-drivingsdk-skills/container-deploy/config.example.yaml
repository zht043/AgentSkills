# DrivingSDK 容器部署配置
# 使用方式：复制为 config.yaml，由 agent 引导填写

images:
  registry: "swr.cn-south-1.myhuaweicloud.com/ascendhub/drivingsdk"
  versions:
    - tag: "8.5.0_alpha001"
      archs: ["arm64"]
    - tag: "8.3.RC1_alpha001"
      archs: ["arm64"]
    # 用户可扩展更多版本和架构
    # - tag: "x.y.z"
    #   archs: ["arm64", "x86_64"]

# conda 环境由脚本动态检测容器内实际可用的 conda 环境
# 不再硬编码环境名，使用 --list-conda-envs 查看或 --conda-env 指定

defaults:
  ssh_port: 2222
