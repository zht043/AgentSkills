# SSH Dev Suite 配置模板
# 使用方式：复制为 config.yaml，由 agent 引导填写，无需手动编辑
# 敏感信息（密码、token）通过环境变量设置，不写入此文件

profiles:
  # 示例：开发服务器
  dev-server:
    host: 192.168.1.100        # 服务器地址（IP 或域名）
    port: 22                   # SSH 端口
    username: deploy           # 登录用户名
    identity_file: ""          # SSH 密钥文件路径（可选，如 ~/.ssh/id_ed25519）
    env_password: ""           # 密码环境变量名（可选，如 SSH_DEV_PASSWORD）
    jump_host: ""              # 跳板机地址（可选）
    container: ""              # 容器名称（可选，连接后自动进入容器）
    container_runtime: docker  # 容器运行时：docker | kubectl

defaults:
  connect_timeout: 10          # 连接超时（秒）
  control_persist: 600         # ControlMaster 会话保持时间（秒）
  retry_count: 3               # 连接失败重试次数

# 部署配置（ssh-deploy 使用）
deploy:
  profile: dev-server              # 引用上方 profile
  local_path: ./                   # 本地项目路径
  remote_path: /opt/app/my-project # 远程部署目标路径
  sync_mode: incremental           # full（完整推送）| incremental（增量同步）
  exclude:                         # 排除文件/目录
    - node_modules/
    - .env
    - "*.log"
  pre_deploy: []                   # 部署前在远程执行的命令列表
  post_deploy: []                  # 部署后在远程执行的命令列表
  rollback: []                     # 回滚命令列表

# 隧道配置（ssh-tunnel 使用）
tunnels:
  # 示例：本地端口转发（访问远程数据库）
  db-forward:
    profile: dev-server
    type: local                    # local | reverse | socks | reverse_proxy
    local_port: 5432
    remote_host: localhost
    remote_port: 5432

  # 示例：反向代理（为无外网服务器提供代理）
  outbound-proxy:
    profile: dev-server
    type: reverse_proxy
    local_proxy_port: 7890
    remote_proxy_port: 7890
